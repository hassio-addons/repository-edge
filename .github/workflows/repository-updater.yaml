---
name: Repository Updater

# yamllint disable-line rule:truthy
on:
  repository_dispatch:
    types: ["update"]

permissions:
  contents: read

jobs:
  workflows:
    uses: hassio-addons/workflows/.github/workflows/repository-updater.yaml@383c10d83acbe341acbb35a4a61bfd14827f00f0 # v3.0.0
    secrets:
      UPDATER_TOKEN: ${{ secrets.UPDATER_TOKEN }}
